<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GR63 단어장</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090f;--card:#18181f;--bd:#252530;--ac:#00d4ff;--ac2:#ff2d55;--sv:#b0b8c8;--tx:#e8eaf0;--mu:#5a5a72;--ok:#00e676;--wn:#ffab00;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:linear-gradient(rgba(0,212,255,.025)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025)1px,transparent 1px);background-size:40px 40px;}
header{position:sticky;top:0;z-index:100;background:rgba(9,9,15,.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:52px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:3px;background:linear-gradient(90deg,var(--ac),var(--sv));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo span{-webkit-text-fill-color:var(--ac2);}
nav{display:flex;gap:2px;}
.nb{background:none;border:none;cursor:pointer;color:var(--mu);font-family:'Noto Sans KR',sans-serif;font-size:.72rem;font-weight:500;padding:5px 8px;border-radius:6px;transition:all .2s;position:relative;}
.nb:hover{color:var(--tx);background:var(--card);}
.nb.on{color:var(--ac);background:rgba(0,212,255,.1);}
.bdg{position:absolute;top:1px;right:1px;background:var(--ac2);color:#fff;font-size:.54rem;font-weight:700;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
main{position:relative;z-index:1;padding:18px 14px;max-width:680px;margin:0 auto;}
.page{display:none;}.page.on{display:block;}
.prog{height:3px;background:var(--bd);border-radius:2px;margin-bottom:16px;overflow:hidden;}
.pb{height:100%;background:linear-gradient(90deg,var(--ac),#0099cc);border-radius:2px;transition:width .4s;}
.scene{perspective:1200px;margin-bottom:12px;}
.flipper{position:relative;width:100%;min-height:285px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer;}
.flipper.f{transform:rotateY(180deg);}
.face{position:absolute;inset:0;border-radius:14px;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden;min-height:285px;}
.fr{background:var(--card);border:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;transition:border-color .3s;}
.fr:hover{border-color:rgba(0,212,255,.3);}
.fr::before{content:'GR';position:absolute;right:-5px;top:-10px;font-family:'Bebas Neue',sans-serif;font-size:5.5rem;color:rgba(0,212,255,.04);pointer-events:none;}
.fhint{font-size:.63rem;color:var(--mu);margin-bottom:16px;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:7px;}
.fhint::before,.fhint::after{content:'';display:block;width:16px;height:1px;background:var(--bd);}
.wbig{font-family:'Noto Sans KR',sans-serif;font-size:clamp(1.6rem,5.5vw,2.5rem);font-weight:700;color:var(--ac);text-align:center;line-height:1.2;}
.wpsm{font-size:.67rem;color:var(--mu);margin-top:7px;letter-spacing:1px;}
.taph{margin-top:20px;font-size:.67rem;color:var(--mu);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.9}}
.bk{background:var(--card);border:1px solid rgba(0,212,255,.18);box-shadow:0 0 18px rgba(0,212,255,.05);transform:rotateY(180deg);padding:20px;display:flex;flex-direction:column;min-height:285px;}
.bword{font-size:1.2rem;font-weight:700;color:var(--ac);margin-bottom:2px;}
.bpos{font-size:.65rem;color:var(--mu);margin-bottom:10px;letter-spacing:1px;}
.mmain{font-size:.96rem;font-weight:600;color:var(--tx);border-left:3px solid var(--ac);padding-left:9px;margin-bottom:4px;}
.mextra{font-size:.74rem;color:var(--mu);padding-left:12px;line-height:1.6;}
.sbox{margin-top:11px;background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.1);border-radius:9px;padding:11px 13px;flex:1;}
.sen{font-size:.82rem;line-height:1.7;color:var(--sv);}
.sen b{color:var(--ac);font-weight:700;}
.skr{font-size:.73rem;color:var(--mu);line-height:1.7;margin-top:7px;border-top:1px solid var(--bd);padding-top:7px;display:none;}
.skr.on{display:block;}
.tkrb{margin-top:7px;background:none;border:1px solid var(--bd);color:var(--mu);font-family:'Noto Sans KR',sans-serif;font-size:.69rem;cursor:pointer;border-radius:6px;padding:3px 9px;transition:all .2s;}
.tkrb:hover{border-color:var(--ac);color:var(--ac);}
.cnav{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;}
.arr{background:var(--card);border:1px solid var(--bd);color:var(--tx);cursor:pointer;border-radius:8px;padding:7px 16px;font-family:'Noto Sans KR',sans-serif;font-size:.77rem;font-weight:500;transition:all .2s;}
.arr:hover{border-color:var(--ac);color:var(--ac);}
.cnt{font-size:.77rem;color:var(--mu);min-width:54px;text-align:center;}
.srow{display:flex;justify-content:center;margin-bottom:11px;}
.sbtn{background:none;border:1px solid var(--bd);color:var(--mu);font-family:'Noto Sans KR',sans-serif;font-size:.75rem;font-weight:500;padding:5px 15px;border-radius:20px;cursor:pointer;transition:all .2s;}
.sbtn:hover{border-color:var(--ac);color:var(--ac);}
.sbtn.on{background:rgba(0,212,255,.1);border-color:var(--ac);color:var(--ac);}
.vrow{display:flex;gap:7px;}
.vb{flex:1;padding:10px 4px;border-radius:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.79rem;font-weight:700;transition:all .2s;}
.vknow{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.25);color:var(--ok);}
.vknow:hover{background:rgba(0,230,118,.18);}
.vhard{background:rgba(255,171,0,.07);border:1px solid rgba(255,171,0,.22);color:var(--wn);}
.vhard:hover{background:rgba(255,171,0,.15);}
.vno{background:rgba(255,45,85,.07);border:1px solid rgba(255,45,85,.22);color:var(--ac2);}
.vno:hover{background:rgba(255,45,85,.15);}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
.stit{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:var(--sv);}
.dtag{font-size:.68rem;color:var(--mu);background:var(--card);border:1px solid var(--bd);border-radius:20px;padding:3px 10px;}
.empty{text-align:center;padding:56px 0;color:var(--mu);font-size:.86rem;line-height:1.8;}
.empty .ico{font-size:2.2rem;margin-bottom:10px;}
.slabel{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:2px;color:var(--sv);margin-bottom:13px;}
.folder{background:var(--card);border:1px solid var(--bd);border-radius:13px;overflow:hidden;margin-bottom:9px;transition:border-color .25s;}
.folder:hover{border-color:rgba(0,212,255,.2);}
.fhdr{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;cursor:pointer;user-select:none;}
.fleft{display:flex;align-items:center;gap:10px;}
.fico{font-size:1.25rem;}
.fdate{font-size:.92rem;font-weight:600;color:var(--tx);}
.fmeta{font-size:.69rem;color:var(--mu);margin-top:2px;}
.fchev{font-size:.67rem;color:var(--mu);transition:transform .25s;}
.fchev.open{transform:rotate(90deg);}
.fbody{border-top:1px solid var(--bd);padding:15px;display:none;}
.fbody.open{display:block;}
.mrow{display:flex;gap:9px;margin-bottom:13px;}
.mbtn{flex:1;padding:12px;border-radius:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.81rem;font-weight:700;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;}
.ms{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25)!important;color:var(--ac);}
.ms:hover{background:rgba(0,212,255,.2);}
.mt{background:rgba(255,171,0,.08);border:1px solid rgba(255,171,0,.22)!important;color:var(--wn);}
.mt:hover{background:rgba(255,171,0,.16);}
.mico{font-size:1.25rem;}
.wlist{display:flex;flex-direction:column;gap:6px;}
.witem{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:8px;padding:8px 11px;display:flex;align-items:center;justify-content:space-between;transition:border-color .2s;}
.witem:hover{border-color:rgba(0,212,255,.2);}
.witem.ww{border-left:3px solid var(--ac2);}
.wword{font-weight:700;color:var(--ac);font-size:.89rem;}
.wmean{font-size:.72rem;color:var(--mu);margin-top:1px;}
.wtag{font-size:.58rem;background:rgba(255,45,85,.12);color:var(--ac2);border-radius:3px;padding:1px 5px;margin-left:4px;}
.wdel{background:none;border:none;cursor:pointer;color:var(--mu);font-size:.86rem;padding:3px;border-radius:4px;transition:color .2s;}
.wdel:hover{color:var(--ac2);}
.bbtn{background:none;border:none;cursor:pointer;color:var(--mu);font-family:'Noto Sans KR',sans-serif;font-size:.76rem;display:flex;align-items:center;gap:4px;padding:0;margin-bottom:13px;transition:color .2s;}
.bbtn:hover{color:var(--ac);}
.qprog{font-size:.69rem;color:var(--mu);margin-bottom:8px;}
.qq{font-size:.98rem;font-weight:600;color:var(--tx);margin-bottom:13px;line-height:1.6;}
.qq b{color:var(--ac);font-size:1.25rem;}
.qq small{font-size:.68rem;color:var(--mu);font-weight:400;margin-left:5px;}
.qopts{display:flex;flex-direction:column;gap:7px;}
.qopt{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.83rem;text-align:left;color:var(--tx);transition:all .2s;font-weight:500;}
.qopt:hover:not(:disabled){border-color:rgba(0,212,255,.3);background:rgba(0,212,255,.06);color:var(--ac);}
.qopt.qok{border-color:var(--ok)!important;background:rgba(0,230,118,.12)!important;color:var(--ok)!important;}
.qopt.qno{border-color:var(--ac2)!important;background:rgba(255,45,85,.1)!important;color:var(--ac2)!important;}
.qnxt{margin-top:11px;width:100%;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.25);color:var(--ac);font-family:'Noto Sans KR',sans-serif;font-size:.83rem;font-weight:700;padding:11px;border-radius:10px;cursor:pointer;transition:all .2s;}
.qnxt:hover{background:rgba(0,212,255,.18);}
.qdone{text-align:center;padding:26px 0;}
.qscore{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:2px;color:var(--ac);}
.qmsg{font-size:.81rem;color:var(--mu);margin-top:7px;line-height:1.6;}
.qrst{margin-top:13px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--ac);font-family:'Noto Sans KR',sans-serif;font-size:.83rem;font-weight:700;padding:10px 26px;border-radius:10px;cursor:pointer;transition:all .2s;}
.qrst:hover{background:rgba(0,212,255,.2);}
.addta{width:100%;background:var(--card);border:1px solid var(--bd);color:var(--tx);border-radius:10px;padding:11px 13px;font-family:'Noto Sans KR',sans-serif;font-size:.83rem;line-height:1.8;resize:vertical;min-height:108px;outline:none;transition:border-color .2s;}
.addta:focus{border-color:var(--ac);}
.addta::placeholder{color:#3a3a50;}
.addhint{font-size:.7rem;color:var(--mu);margin-top:5px;line-height:1.6;}
.addbtn{width:100%;margin-top:9px;padding:11px;background:linear-gradient(90deg,rgba(0,212,255,.13),rgba(0,212,255,.07));border:1px solid rgba(0,212,255,.28);color:var(--ac);border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:.83rem;font-weight:700;cursor:pointer;transition:all .2s;}
.addbtn:hover{background:rgba(0,212,255,.2);}
.addbtn:disabled{opacity:.4;cursor:not-allowed;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spn .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spn{to{transform:rotate(360deg);}}
.ti{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;margin-bottom:5px;}
.tw{font-weight:700;color:var(--ac);font-size:.86rem;}
.tm{font-size:.71rem;color:var(--mu);}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--card);border:1px solid var(--bd);color:var(--tx);font-size:.77rem;padding:8px 16px;border-radius:20px;opacity:0;transition:all .28s;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.backup-box{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:13px;margin-top:10px;}
.backup-box textarea{width:100%;background:#09090f;border:1px solid var(--bd);color:var(--sv);border-radius:8px;padding:9px;font-size:.72rem;height:90px;resize:none;outline:none;font-family:monospace;}
.backup-row{display:flex;gap:7px;margin-top:8px;}
.bkbtn{flex:1;padding:8px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .2s;}
.bkexp{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.25);color:var(--ac);}
.bkimp{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.25);color:var(--ok);}
</style>
</head>
<body>
<header>
  <div class="logo">GR<span>63</span> VOCAB</div>
  <nav>
    <button class="nb on" onclick="goPage('study',this)">📚 학습</button>
    <button class="nb" onclick="goPage('review',this)">🔥 오답<span class="bdg" id="rvbdg" style="display:none"></span></button>
    <button class="nb" onclick="goPage('archive',this)">🗂 보관함</button>
    <button class="nb" onclick="goPage('add',this)">➕ 추가</button>
  </nav>
</header>
<main>
  <div class="page on" id="page-study">
    <div class="top"><div class="stit">오늘의 단어</div><div class="dtag" id="tlabel"></div></div>
    <div class="prog"><div class="pb" id="mprog"></div></div>
    <div class="scene" id="mscene">
      <div class="flipper" id="mflip" onclick="flipMain()">
        <div class="face fr">
          <div class="fhint">단어</div>
          <div class="wbig" id="fw"></div>
          <div class="wpsm" id="fp"></div>
          <div class="taph">👆 탭해서 뜻 보기</div>
        </div>
        <div class="face bk">
          <div class="bword" id="fbw"></div><div class="bpos" id="fbp"></div>
          <div class="mmain" id="fbm"></div><div class="mextra" id="fbe"></div>
          <div class="sbox">
            <div class="sen" id="fbs"></div>
            <div class="skr" id="fbsk"></div>
            <button class="tkrb" id="fbtkr" onclick="event.stopPropagation();tkr('fbsk','fbtkr')">🇰🇷 한글 번역 보기</button>
          </div>
        </div>
      </div>
    </div>
    <div class="cnav">
      <button class="arr" onclick="mv(-1)">← 이전</button>
      <span class="cnt" id="mcnt"></span>
      <button class="arr" onclick="mv(1)">다음 →</button>
    </div>
    <div class="srow"><button class="sbtn" id="sfbtn" onclick="toggleShuffle()">🔀 섞기</button></div>
    <div class="vrow">
      <button class="vb vknow" onclick="mark('know')">✅ 알아요</button>
      <button class="vb vhard" onclick="mark('hard')">😅 어려워요</button>
      <button class="vb vno" onclick="mark('no')">❌ 몰라요</button>
    </div>
  </div>
  <div class="page" id="page-review"><div id="rvcont"></div></div>
  <div class="page" id="page-archive">
    <div class="slabel">🗂 날짜별 단어 보관함</div>
    <div id="arclist"></div>
  </div>
  <div class="page" id="page-add">
    <div class="slabel">단어 추가하기</div>
    <input id="apikey" type="password" class="addta" style="min-height:unset;margin-bottom:6px" placeholder="🔑 Google AI Studio API 키 (자동 저장)">
    <textarea class="addta" id="addinp" placeholder="단어를 자유롭게 입력하세요!
예: identify with 동일시하다
줄글도 OK: 오늘 animate랑 exhausted 추가하고 싶어"></textarea>
    <div class="addhint">💡 뜻이 있으면 그대로, 없으면 단어만 써도 돼요. F1/GR 예문 자동 생성!</div>
    <button class="addbtn" id="addbtn" onclick="addWords()">🏁 단어 추가 &amp; 예문 생성</button>
    <div id="addgen"></div>
    <div id="tadded" style="margin-top:20px;display:none"><div class="slabel">오늘 추가한 단어</div><div id="tlist"></div></div>
    <div style="margin-top:24px">
      <div class="slabel">💾 백업 / 복원</div>
      <div class="backup-box">
        <div style="font-size:.72rem;color:var(--mu);margin-bottom:8px">단어 데이터를 복사해두거나 붙여넣어 복원할 수 있어요</div>
        <textarea id="backta" placeholder="여기에 백업 데이터가 나타납니다..."></textarea>
        <div class="backup-row">
          <button class="bkbtn bkexp" onclick="exportData()">📋 백업 복사</button>
          <button class="bkbtn bkimp" onclick="importData()">📥 붙여넣어 복원</button>
        </div>
      </div>
    </div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
const WORKER='https://gr-voca.nixxiszzz.workers.dev';
const W=[
{word:"identify with",pos:"phrasal v.",mu:"동일시하다",me:"(어떤 사람/상황에) 공감하다, 자신을 동일시하다",se:"George Russell said fans often <b>identify with</b> him because of his long journey from Formula 2 to a race winner.",sk:"조지 러셀은 팬들이 F2부터 레이스 우승까지의 긴 여정 때문에 자신과 동일시하는 경우가 많다고 말했다."},
{word:"animate",pos:"v.",mu:"생기를 불어넣다",me:"활기차게 하다 / (형) 살아있는, 생기 있는",se:"A podium finish seemed to <b>animate</b> Russell's entire team, sending waves of energy through the Mercedes garage.",sk:"포디엄 피니시는 러셀의 팀 전체에 생기를 불어넣는 것 같았고, 메르세데스 차고 전체에 활력이 넘쳤다."},
{word:"exhausted",pos:"adj.",mu:"지친 / 고갈된",me:"완전히 소진된, 기진맥진한",se:"Russell looked completely <b>exhausted</b> after the 70-lap race in Singapore, yet still delivered a flawless performance.",sk:"러셀은 싱가포르의 70랩 레이스 후 완전히 지쳐 보였지만, 여전히 완벽한 퍼포먼스를 선보였다."},
{word:"retrieval",pos:"n.",mu:"회수 / 검색",me:"정보·물건을 되찾거나 불러오는 행위",se:"The <b>retrieval</b> of crucial data from Russell's sensors helped engineers fine-tune the setup before qualifying.",sk:"러셀 센서에서 중요한 데이터를 회수한 덕분에 엔지니어들은 예선 전에 셋업을 미세 조정할 수 있었다."},

{word:"specific",pos:"adj.",mu:"구체화인 → 세부화함",me:"특정한, 구체적인, 명확한",se:"Russell gave very <b>specific</b> feedback on understeer, helping engineers pinpoint the issue.",sk:"러셀은 언더스티어에 대해 매우 구체적인 피드백을 제공하여 정확한 문제를 찾아낼 수 있도록 했다."},
];

function loadWords(){try{const s=localStorage.getItem(‘gr63_words’);return s?JSON.parse(s):W.map(w=>({…w,date:ts(),wc:0}));}catch(e){return W.map(w=>({…w,date:ts(),wc:0}));}}
function saveWords(){try{localStorage.setItem(‘gr63_words’,JSON.stringify(words));}catch(e){}}
function loadWrong(){try{const s=localStorage.getItem(‘gr63_wrong’);return s?JSON.parse(s):[];}catch(e){return[];}}
function saveWrong(){try{localStorage.setItem(‘gr63_wrong’,JSON.stringify(wrong));}catch(e){}}

let words=loadWords(),wrong=loadWrong(),ci=0,sf=false,ord=[];

function ts(){return new Date().toISOString().slice(0,10);}
function fd(s){const d=new Date(s);return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;}
function tl(){return new Date().toLocaleDateString(‘ko-KR’,{year:‘numeric’,month:‘long’,day:‘numeric’});}
function todayWords(){return words.filter(w=>w.date===ts());}
function buildOrd(){const tw=todayWords();return(tw.length?tw:words).map(w=>words.indexOf(w));}

let tt;
function toast(m){const t=document.getElementById(‘toast’);t.textContent=m;t.classList.add(‘show’);clearTimeout(tt);tt=setTimeout(()=>t.classList.remove(‘show’),2000);}

function goPage(id,btn){
document.querySelectorAll(’.page’).forEach(p=>p.classList.remove(‘on’));
document.querySelectorAll(’.nb’).forEach(b=>b.classList.remove(‘on’));
document.getElementById(‘page-’+id).classList.add(‘on’);btn.classList.add(‘on’);
if(id===‘study’){ord=buildOrd();ci=0;sf=false;document.getElementById(‘sfbtn’).textContent=‘🔀 섞기’;document.getElementById(‘sfbtn’).classList.remove(‘on’);rs();}
if(id===‘review’){rvi=0;brv();}
if(id===‘archive’)rarc();
if(id===‘add’)rta();
}

function dw(){return ord.map(i=>words[i]);}

function rs(){
document.getElementById(‘tlabel’).textContent=tl();
const d=dw();
if(!d.length){document.getElementById(‘fw’).textContent=‘단어 없음’;document.getElementById(‘mcnt’).textContent=‘0/0’;document.getElementById(‘mprog’).style.width=‘0%’;return;}
if(ci>=d.length)ci=0;
const w=d[ci];
document.getElementById(‘fw’).textContent=w.word;
document.getElementById(‘fp’).textContent=w.pos;
document.getElementById(‘fbw’).textContent=w.word;
document.getElementById(‘fbp’).textContent=w.pos;
document.getElementById(‘fbm’).textContent=w.mu;
document.getElementById(‘fbe’).textContent=w.me;
document.getElementById(‘fbs’).innerHTML=w.se;
document.getElementById(‘fbsk’).textContent=w.sk;
document.getElementById(‘fbsk’).classList.remove(‘on’);
document.getElementById(‘fbtkr’).textContent=‘🇰🇷 한글 번역 보기’;
document.getElementById(‘mcnt’).textContent=`${ci+1} / ${d.length}`;
document.getElementById(‘mprog’).style.width=`${((ci+1)/d.length)*100}%`;
document.getElementById(‘mflip’).classList.remove(‘f’);
}

function flipMain(){document.getElementById(‘mflip’).classList.toggle(‘f’);}
function tkr(sid,bid){const s=document.getElementById(sid),b=document.getElementById(bid);s.classList.toggle(‘on’);b.textContent=s.classList.contains(‘on’)?‘🇰🇷 번역 숨기기’:‘🇰🇷 한글 번역 보기’;}
function mv(d){const dws=dw();ci=(ci+d+dws.length)%dws.length;rs();}

function toggleShuffle(){
sf=!sf;const b=document.getElementById(‘sfbtn’);
if(sf){const a=[…ord];for(let i=a.length-1;i>0;i–){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}ord=a;b.textContent=‘🔀 섞는 중’;b.classList.add(‘on’);toast(‘🔀 섞였어요!’);}
else{ord=buildOrd();b.textContent=‘🔀 섞기’;b.classList.remove(‘on’);toast(‘📋 원래 순서로!’);}
ci=0;rs();
}

function mark(v){
const w=dw()[ci];if(!w)return;
if(v===‘know’){wrong=wrong.filter(k=>k!==w.word);toast(‘✅ 오답에서 제거!’);}
else{if(!wrong.includes(w.word))wrong.push(w.word);toast(v===‘no’?‘❌ 오답 추가!’:‘😅 오답 추가!’);}
saveWrong();ubdg();mv(1);
}
function ubdg(){const b=document.getElementById(‘rvbdg’);b.textContent=wrong.length;b.style.display=wrong.length?‘flex’:‘none’;}

/* REVIEW */
let rvi=0;
function brv(){
const ww=words.filter(w=>wrong.includes(w.word));
const c=document.getElementById(‘rvcont’);
if(!ww.length||rvi>=ww.length){c.innerHTML=`<div class="empty"><div class="ico">🏆</div>${!ww.length?'오답 단어가 없어요!<br>GR처럼 완벽해요 🏁':'오답 단어를 모두 복습했어요!'}</div>`;return;}
const w=ww[rvi];const s1=‘rvsk’+rvi,b1=‘rvtkr’+rvi;
c.innerHTML=`<div class="top" style="margin-bottom:13px"><div class="stit">🔥 오답 노트</div><div class="dtag">${rvi+1} / ${ww.length}</div></div>

  <div class="prog"><div class="pb" style="width:${((rvi+1)/ww.length)*100}%"></div></div>
  <div class="scene"><div class="flipper" id="rvf" onclick="this.classList.toggle('f')">
    <div class="face fr"><div class="fhint">단어</div><div class="wbig">${w.word}</div><div class="wpsm">${w.pos}</div><div class="taph">👆 탭해서 뜻 보기</div></div>
    <div class="face bk"><div class="bword">${w.word}</div><div class="bpos">${w.pos}</div><div class="mmain">${w.mu}</div><div class="mextra">${w.me}</div>
      <div class="sbox"><div class="sen">${w.se}</div><div class="skr" id="${s1}">${w.sk}</div>
        <button class="tkrb" id="${b1}" onclick="event.stopPropagation();tkr('${s1}','${b1}')">🇰🇷 한글 번역 보기</button></div></div>
  </div></div>
  <div class="vrow" style="margin-top:11px">
    <button class="vb vknow" onclick="rvm('know')">✅ 이제 알아요</button>
    <button class="vb vno" onclick="rvm('no')">❌ 아직 모르겠어</button>
  </div>`;
}
function rvm(v){
  const ww=words.filter(w=>wrong.includes(w.word));
  if(v==='know'){wrong=wrong.filter(k=>k!==ww[rvi].word);toast('✅ 오답 제거!');}
  else toast('❌ 다음에 또 복습해요!');
  saveWrong();ubdg();rvi++;brv();
}

/* ARCHIVE */
function rarc(){
const bd={};words.forEach(w=>{if(!bd[w.date])bd[w.date]=[];bd[w.date].push(w);});
const dates=Object.keys(bd).sort((a,b)=>b.localeCompare(a));
if(!dates.length){document.getElementById(‘arclist’).innerHTML=’<div class="empty"><div class="ico">📭</div>저장된 단어가 없어요</div>’;return;}
document.getElementById(‘arclist’).innerHTML=dates.map(dt=>`

  <div class="folder" id="fold-${dt}">
    <div class="fhdr" onclick="tgf('${dt}')">
      <div class="fleft"><span class="fico" id="fico-${dt}">📁</span>
        <div><div class="fdate">${fd(dt)}</div><div class="fmeta">단어 ${bd[dt].length}개 · 오답 ${bd[dt].filter(w=>wrong.includes(w.word)).length}개</div></div></div>
      <span class="fchev" id="fchev-${dt}">▶</span></div>
    <div class="fbody" id="fbody-${dt}">
      <div class="mrow">
        <button class="mbtn ms" onclick="fss('${dt}')"><span class="mico">📚</span>단어 학습</button>
        <button class="mbtn mt" onclick="fqs('${dt}')"><span class="mico">✏️</span>시험 보기</button>
      </div>
      <div class="wlist">${bd[dt].map(w=>`
        <div class="witem${wrong.includes(w.word)?' ww':''}">
          <div><div><span class="wword">${w.word}</span>${wrong.includes(w.word)?'<span class="wtag">오답</span>':''}</div>
            <div class="wmean">${w.mu}</div></div>
          <button class="wdel" onclick="delWord('${w.word.replace(/'/g,"\\'")}')">🗑</button>
        </div>`).join('')}</div>
    </div>
  </div>`).join('');
}

function tgf(dt){
const body=document.getElementById(‘fbody-’+dt),chev=document.getElementById(‘fchev-’+dt),ico=document.getElementById(‘fico-’+dt);
const o=body.classList.contains(‘open’);
body.classList.toggle(‘open’);chev.classList.toggle(‘open’,!o);ico.textContent=o?‘📁’:‘📂’;
}

let fsi=0,fsw=[],fsd=’’;
function fss(dt){
const bd={};words.forEach(w=>{if(!bd[w.date])bd[w.date]=[];bd[w.date].push(w);});
fsw=bd[dt]||[];fsi=0;fsd=dt;document.getElementById(‘fbody-’+dt).innerHTML=bfsh(dt);
}
function bfsh(dt){
if(!fsw.length)return’<div class="empty"><div class="ico">📭</div>단어 없음</div>’;
const w=fsw[fsi];const s2=‘fssk’+fsi,b2=‘fstkr’+fsi;
return`<button class="bbtn" onclick="btf('${dt}')">← 목록으로</button>

  <div class="top" style="margin-bottom:11px"><div class="stit" style="font-size:.95rem">단어 학습</div><div class="dtag">${fsi+1} / ${fsw.length}</div></div>
  <div class="prog"><div class="pb" style="width:${((fsi+1)/fsw.length)*100}%"></div></div>
  <div class="scene"><div class="flipper" id="fsf" onclick="this.classList.toggle('f')">
    <div class="face fr"><div class="fhint">단어</div><div class="wbig">${w.word}</div><div class="wpsm">${w.pos}</div><div class="taph">👆 탭해서 뜻 보기</div></div>
    <div class="face bk"><div class="bword">${w.word}</div><div class="bpos">${w.pos}</div><div class="mmain">${w.mu}</div><div class="mextra">${w.me}</div>
      <div class="sbox"><div class="sen">${w.se}</div><div class="skr" id="${s2}">${w.sk}</div>
        <button class="tkrb" id="${b2}" onclick="event.stopPropagation();tkr('${s2}','${b2}')">🇰🇷 한글 번역 보기</button></div></div>
  </div></div>
  <div class="cnav">
    <button class="arr" onclick="fsg(-1,'${dt}')" ${fsi===0?'style="opacity:.4"':''}>← 이전</button>
    <span class="cnt">${fsi+1} / ${fsw.length}</span>
    <button class="arr" onclick="fsg(1,'${dt}')" ${fsi===fsw.length-1?'style="opacity:.4"':''}>다음 →</button>
  </div>`;
}
function fsg(d,dt){const n=fsi+d;if(n<0||n>=fsw.length)return;fsi=n;document.getElementById('fbody-'+dt).innerHTML=bfsh(dt);}

let fqi=0,fqs2=[],fqsc=0,fqch=null,fqd=’’;
function shar(a){const r=[…a];for(let i=r.length-1;i>0;i–){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function fqs(dt){
const bd={};words.forEach(w=>{if(!bd[w.date])bd[w.date]=[];bd[w.date].push(w);});
fqd=dt;fqs2=shar([…(bd[dt]||[])]);fqi=0;fqsc=0;fqch=null;
document.getElementById(‘fbody-’+dt).innerHTML=bfqh(dt);
}
function bfqh(dt){
if(fqi>=fqs2.length){const s=fqsc,t=fqs2.length;return` <button class="bbtn" onclick="btf('${dt}')">← 목록으로</button> <div class="qdone"><div style="font-size:2.4rem;margin-bottom:9px">${s===t?'🏆':s>=t*.7?'🎉':'📚'}</div> <div class="qscore">${s} / ${t}</div> <div class="qmsg">${s===t?'완벽해요! GR처럼 실수 없이 🏁':s>=t*.7?'잘했어요! 💪':'더 복습이 필요해요 🔄'}</div> <button class="qrst" onclick="fqs('${dt}')">🔄 다시 풀기</button></div>`;}
const qw=fqs2[fqi];
const opts=shar([qw,…shar(words.filter(w=>w.word!==qw.word)).slice(0,3)]);
const oh=opts.map(o=>{
let cls=‘qopt’;
if(fqch){cls+=o.word===qw.word?’ qok’:o.word===fqch?’ qno’:’’;}
return`<button class="${cls}" onclick="fqp('${o.word.replace(/'/g,"\\'")}','${dt}')" ${fqch?'disabled':''}>${o.mu}</button>`;
}).join(’’);
return`<button class="bbtn" onclick="btf('${dt}')">← 목록으로</button>

  <div class="qprog">${fqi+1} / ${fqs2.length} · ✅ ${fqsc}개 맞춤</div>
  <div class="prog"><div class="pb" style="width:${((fqi+1)/fqs2.length)*100}%"></div></div>
  <div class="qq">다음 단어의 뜻은?<br><b>${qw.word}</b><small>${qw.pos}</small></div>
  <div class="qopts">${oh}</div>
  ${fqch?`<button class="qnxt" onclick="fqn('${dt}')">${fqi+1>=fqs2.length?'결과 보기 →':'다음 →'}</button>`:''}`;
}
function fqp(word,dt){if(fqch)return;fqch=word;if(word===fqs2[fqi].word)fqsc++;document.getElementById('fbody-'+dt).innerHTML=bfqh(dt);}
function fqn(dt){fqi++;fqch=null;document.getElementById('fbody-'+dt).innerHTML=bfqh(dt);}
function btf(dt){rarc();setTimeout(()=>{const b=document.getElementById('fbody-'+dt),c=document.getElementById('fchev-'+dt),i=document.getElementById('fico-'+dt);if(b){b.classList.add('open');if(c)c.classList.add('open');if(i)i.textContent='📂';}},50);}

function delWord(word){
if(!confirm(`"${word}" 를 삭제할까요?`))return;
words=words.filter(w=>w.word!==word);wrong=wrong.filter(k=>k!==word);
saveWords();saveWrong();ord=buildOrd();ci=0;ubdg();rarc();toast(‘🗑 삭제됐어요’);
}

/* ADD */
function rta(){
const saved=localStorage.getItem(‘gr63_apikey’);
if(saved)document.getElementById(‘apikey’).value=saved;
const td=ts(),tw=words.filter(w=>w.date===td);
const sec=document.getElementById(‘tadded’),list=document.getElementById(‘tlist’);
if(!tw.length){sec.style.display=‘none’;return;}
sec.style.display=‘block’;
list.innerHTML=tw.map(w=>`<div class="ti"><div class="tw">${w.word}</div><div class="tm">${w.mu}</div></div>`).join(’’);
}

async function addWords(){
const raw=document.getElementById(‘addinp’).value.trim();
const apiKey=document.getElementById(‘apikey’).value.trim();
if(!raw){toast(‘단어를 입력해주세요!’);return;}
if(!apiKey){toast(‘🔑 API 키를 먼저 입력해주세요!’);return;}
localStorage.setItem(‘gr63_apikey’,apiKey);
const btn=document.getElementById(‘addbtn’),gen=document.getElementById(‘addgen’);
btn.disabled=true;
gen.innerHTML=’<div style="text-align:center;padding:14px;color:var(--mu);font-size:.8rem"><span class="spin"></span>GR 예문 생성 중…</div>’;
const prompt=`You are a vocabulary card generator for a Korean student learning English through Formula 1 / George Russell content.
Parse the input and extract vocabulary items. Return a JSON array. Each object:

- word: string (English, lowercase)
- pos: string
- mu: string (Korean meaning, short)
- me: string (extra Korean note, 1-2 lines)
- se: string (F1/George Russell or George & Max rivalry themed sentence, wrap target word with <b> tags)
- sk: string (Korean translation of the sentence)
  ALL sentences must be F1/Mercedes/George Russell or George-Max rivalry themed. Respond ONLY with valid JSON array, no markdown.
  Input: ${raw}`; try{ const res=await fetch( `${WORKER}/?key=${encodeURIComponent(apiKey)}`, {method:'POST',headers:{'Content-Type':'application/json'}, body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})} ); const data=await res.json(); if(data.error){gen.innerHTML=`<div style="color:var(--ac2);font-size:.75rem;padding:10px;background:var(--card);border-radius:8px;margin-top:8px">${JSON.stringify(data.error)}</div>`;btn.disabled=false;return;} const text=data.candidates[0].content.parts[0].text; const parsed=JSON.parse(text.replace(/```json|```/g,'').trim()); const today=ts(); parsed.forEach(p=>{if(!words.find(w=>w.word.toLowerCase()===p.word.toLowerCase()))words.push({...p,date:today,wc:0});}); saveWords();ord=buildOrd(); document.getElementById('addinp').value='';gen.innerHTML='';rta();toast(`✅ ${parsed.length}개 단어 추가됐어요!`); }catch(e){ gen.innerHTML=`<div style="color:var(--ac2);font-size:.75rem;padding:10px;background:var(--card);border-radius:8px;margin-top:8px">오류: ${e.message}</div>`;
  }
  btn.disabled=false;
  }

/* BACKUP */
function exportData(){
const json=JSON.stringify({words,wrong});
document.getElementById(‘backta’).value=json;
navigator.clipboard.writeText(json).then(()=>toast(‘📋 클립보드에 복사됐어요!’)).catch(()=>toast(‘텍스트를 직접 복사해주세요’));
}
function importData(){
const raw=document.getElementById(‘backta’).value.trim();
if(!raw){toast(‘복원할 데이터를 붙여넣어주세요!’);return;}
try{
const data=JSON.parse(raw);
if(!data.words||!Array.isArray(data.words))throw new Error(‘잘못된 형식’);
if(!confirm(`단어 ${data.words.length}개를 복원할까요?`))return;
words=data.words;wrong=data.wrong||[];
saveWords();saveWrong();ord=buildOrd();ci=0;ubdg();
toast(‘✅ 복원됐어요!’);
}catch(e){toast(‘❌ 올바른 백업 데이터가 아니에요’);}
}

/* SWIPE */
let tx=0,ty=0;
const msc=document.getElementById(‘mscene’);
msc.addEventListener(‘touchstart’,e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
msc.addEventListener(‘touchend’,e=>{
const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
if(Math.abs(dx)<50&&Math.abs(dy)<50)return;
if(Math.abs(dx)>=Math.abs(dy)){if(dx<0)mv(1);else mv(-1);}else flipMain();
},{passive:true});

/* INIT */
ord=buildOrd();rs();ubdg();
</script>

</body>
</html>

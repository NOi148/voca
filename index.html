<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GR63 VOCAB ULTIMATE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090f;--card:#18181f;--bd:#252530;--ac:#00d4ff;--ac2:#ff2d55;--sv:#b0b8c8;--tx:#e8eaf0;--mu:#5a5a72;--ok:#00e676;--wn:#ffab00;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{position:sticky;top:0;z-index:100;background:rgba(9,9,15,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--bd);padding:0 15px;display:flex;align-items:center;justify-content:space-between;height:55px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:3px;color:var(--ac);}
.logo span{color:var(--ac2);}
nav{display:flex;gap:5px;}
.nb{background:none;border:none;cursor:pointer;color:var(--mu);font-size:.75rem;padding:8px;border-radius:6px;}
.nb.on{color:var(--ac);background:rgba(0,212,255,.1);}
main{padding:20px 15px;max-width:600px;margin:0 auto;}
.page{display:none;}.page.on{display:block;}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
.stit{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--sv);}
.prog{height:3px;background:var(--bd);border-radius:2px;margin-bottom:15px;overflow:hidden;}
.pb{height:100%;background:var(--ac);transition:width .3s;}
.scene{perspective:1000px;margin-bottom:20px;}
.flipper{position:relative;width:100%;min-height:300px;transform-style:preserve-3d;transition:0.6s;cursor:pointer;}
.flipper.f{transform:rotateY(180deg);}
.face{position:absolute;inset:0;border-radius:15px;backface-visibility:hidden;display:flex;flex-direction:column;padding:30px;border:1px solid var(--bd);background:var(--card);}
.fr{align-items:center;justify-content:center;}
.bk{transform:rotateY(180deg);border-color:var(--ac);}
.wbig{font-size:2.2rem;font-weight:700;color:var(--ac);text-align:center;}
.bword{font-size:1.4rem;font-weight:700;color:var(--ac);margin-bottom:10px;}
.mmain{font-size:1rem;font-weight:600;margin-bottom:15px;border-left:4px solid var(--ac2);padding-left:10px;}
.sbox{background:rgba(255,255,255,0.03);padding:15px;border-radius:10px;flex:1;}
.sen{font-size:.9rem;line-height:1.6;color:var(--sv);margin-bottom:10px;}
.sen b{color:var(--ac);}
.skr{font-size:.8rem;color:var(--mu);border-top:1px solid var(--bd);padding-top:10px;display:none;}.skr.on{display:block;}
.vrow{display:flex;gap:10px;margin-top:10px;}
.vb{flex:1;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;border:none;font-family:inherit;}
.vknow{background:rgba(0,230,118,0.15);color:var(--ok);border:1px solid var(--ok);}
.vno{background:rgba(255,45,85,0.15);color:var(--ac2);border:1px solid var(--ac2);}
.folder{background:var(--card);border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.fhdr{padding:15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.fbody{display:none;padding:15px;border-top:1px solid var(--bd);background:rgba(0,0,0,0.2);}
.fbody.open{display:block;}
.mrow{display:flex;gap:8px;margin-bottom:15px;}
.mbtn{flex:1;padding:10px;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;border:none;background:var(--bd);color:var(--tx);}
.mbtn.blue{background:rgba(0,212,255,0.2);color:var(--ac);}
.witem{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.addta{width:100%;min-height:200px;background:var(--card);border:1px solid var(--bd);color:#fff;padding:15px;border-radius:10px;margin-bottom:10px;}
.addbtn{width:100%;padding:15px;background:var(--ac);color:#000;border:none;border-radius:10px;font-weight:700;cursor:pointer;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ac);color:#000;padding:8px 20px;border-radius:30px;font-size:.8rem;opacity:0;transition:0.3s;z-index:1000;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="logo">GR<span>63</span> VOCAB</div>
  <nav>
    <button class="nb on" onclick="goPage('study',this)">학습</button>
    <button class="nb" onclick="goPage('archive',this)">보관함</button>
    <button class="nb" onclick="goPage('add',this)">추가</button>
  </nav>
</header>

<main>
  <div class="page on" id="page-study">
    <div class="top"><div class="stit" id="study-mode-title">RANDOM STUDY</div><div id="study-count" style="font-size:0.8rem;color:var(--mu);"></div></div>
    <div class="prog"><div class="pb" id="mprog"></div></div>
    <div class="scene">
      <div class="flipper" id="mflip" onclick="this.classList.toggle('f')">
        <div class="face fr"><div class="wbig" id="fw">단어를 추가하세요</div></div>
        <div class="face bk">
          <div class="bword" id="fbw"></div>
          <div class="mmain" id="fbm"></div>
          <div class="sbox">
            <div class="sen" id="fbs"></div>
            <div class="skr" id="fbsk"></div>
            <button class="mbtn" style="margin-top:10px;width:auto;" onclick="event.stopPropagation();document.getElementById('fbsk').classList.toggle('on')">해석 보기</button>
          </div>
        </div>
      </div>
    </div>
    <div class="vrow">
      <button class="vb vknow" onclick="mark(true)">알아요</button>
      <button class="vb vno" onclick="mark(false)">몰라요</button>
    </div>
  </div>

  <div class="page" id="page-archive">
    <div class="stit" style="margin-bottom:15px;">DATE ARCHIVE</div>
    <div id="arclist"></div>
  </div>

  <div class="page" id="page-add">
    <div class="stit" style="margin-bottom:10px;">ADD NEW WORDS</div>
    <textarea class="addta" id="addinp" placeholder="단어 뜻 예문 해석 (한 줄에 하나씩)"></textarea>
    <button class="addbtn" onclick="processAdd()">단어장 업데이트 🏁</button>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
let words = JSON.parse(localStorage.getItem('gr_words')) || [];
let currentSessionWords = [];
let ci = 0;

function ts() { return new Date().toISOString().slice(0,10); }
function save() { localStorage.setItem('gr_words', JSON.stringify(words)); }
function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

function goPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  document.getElementById('page-' + id).classList.add('on');
  if(btn) btn.classList.add('on');
  if(id === 'archive') renderArchive();
  if(id === 'study' && currentSessionWords.length === 0) startStudy(words, "ALL WORDS");
}

// 단어 섞기 함수
function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

// 학습 시작 (모드 설정)
function startStudy(targetWords, modeName) {
  if (targetWords.length === 0) {
    toast("출력할 단어가 없습니다.");
    return;
  }
  currentSessionWords = shuffle([...targetWords]);
  ci = 0;
  document.getElementById('study-mode-title').textContent = modeName;
  goPage('study');
  renderStudy();
}

function renderStudy() {
  if (currentSessionWords.length === 0) {
    document.getElementById('fw').textContent = "공부 완료! 🏁";
    return;
  }
  const w = currentSessionWords[ci];
  document.getElementById('fw').textContent = w.word;
  document.getElementById('fbw').textContent = w.word;
  document.getElementById('fbm').textContent = w.mu;
  document.getElementById('fbs').innerHTML = w.se || "예문이 없습니다.";
  document.getElementById('fbsk').textContent = w.sk || "해석이 없습니다.";
  document.getElementById('fbsk').classList.remove('on');
  document.getElementById('mflip').classList.remove('f');
  document.getElementById('study-count').textContent = `${ci + 1} / ${currentSessionWords.length}`;
  document.getElementById('mprog').style.width = `${((ci + 1) / currentSessionWords.length) * 100}%`;
}

function mark(known) {
  if (currentSessionWords.length === 0) return;
  if (known) {
    toast("✅ 마스터!");
    currentSessionWords.splice(ci, 1);
    if (ci >= currentSessionWords.length) ci = 0;
  } else {
    toast("❌ 오답!");
    ci = (ci + 1) % currentSessionWords.length;
  }
  renderStudy();
}

function processAdd() {
  const text = document.getElementById('addinp').value.trim();
  if(!text) return;
  const lines = text.split('\n');
  let count = 0;
  lines.forEach(line => {
    const regex = /([a-zA-Z\s'-]+)\s+([가-힣\s/(),]+)\s+([a-zA-Z\s'.,!?]+)\s+([가-힣\s'.,!?]+)/;
    const match = line.match(regex);
    if (match) {
      const [_, word, mu, se, sk] = match.map(s => s.trim());
      words.push({ word, mu, se: se.replace(new RegExp(word, 'gi'), `<b>$&</b>`), sk, date: ts() });
      count++;
    } else {
      const simpleMatch = line.match(/([a-zA-Z\s'-]+)\s+([가-힣\s/(),]+)/);
      if (simpleMatch) {
        const [_, word, mu] = simpleMatch.map(s => s.trim());
        words.push({ word, mu, se: `<b>${word}</b> is vital in F1.`, sk: `${mu}은 F1에서 중요하다.`, date: ts() });
        count++;
      }
    }
  });
  save();
  document.getElementById('addinp').value = '';
  toast(`${count}개 단어 추가 완료!`);
  renderArchive();
}

function renderArchive() {
  const list = document.getElementById('arclist');
  const groups = {};
  words.forEach(w => { groups[w.date] = groups[w.date] || []; groups[w.date].push(w); });

  list.innerHTML = Object.keys(groups).sort().reverse().map(date => `
    <div class="folder">
      <div class="fhdr" onclick="toggleFolder(this)">
        <div>📅 ${date} <span style="color:var(--mu);font-size:.7rem;margin-left:10px;">${groups[date].length} Words</span></div>
        <span>▼</span>
      </div>
      <div class="fbody">
        <div class="mrow">
          <button class="mbtn blue" onclick="startStudy(getWordsByDate('${date}'), '${date} TEST')">📝 시험 보기</button>
          <button class="mbtn" onclick="this.parentElement.nextElementSibling.classList.toggle('open')">📋 목록 보기</button>
        </div>
        <div class="word-list-inner" style="display:none;">
          ${groups[date].map(w => `
            <div class="witem">
              <span><b>${w.word}</b> ${w.mu}</span>
              <button onclick="deleteWord('${w.word}')" style="background:none;border:none;color:var(--ac2);cursor:pointer;">🗑</button>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function toggleFolder(el) { el.nextElementSibling.classList.toggle('open'); }
function getWordsByDate(date) { return words.filter(w => w.date === date); }

function deleteWord(wordStr) {
  if(!confirm('삭제할까요?')) return;
  words = words.filter(w => w.word !== wordStr);
  save();
  renderArchive();
}

// 초기 실행
if(words.length > 0) startStudy(words, "ALL WORDS");
</script>
</body>
</html>
